# Organization Profile Configuration
# This file defines the structure, questions, and flow for profile creation

# Initial Greeting Configuration
initial_greeting:
  message: |
    Hello! I'm here to help you create a comprehensive organization profile that will enable tailored security and risk assessments.
    
    To get started, I'll need to know your organization's name. This will help me create a proper profile for you.
    
    What is the name of your organization?
  
  document_prompt: "After we establish your organization name, you can upload documents (policies, architecture diagrams, compliance documents, etc.) to help me better understand your organization."
  
  continue_keywords:
    - "continue"
    - "start"
    - "begin"
    - "let's go"
    - "proceed"
    - "ready"
  
  document_uploaded_keywords:
    - "uploaded"
    - "added"
    - "attached"
    - "document"
    - "file"

# Profile Structure Definition
profile_structure:
  sections:
    - name: "Basic Information"
      priority: 1
      required: true
      fields:
        - name: "organization_name"
          type: "text"
          required: true
          question: "What is the name of your organization?"
          
        - name: "industry"
          type: "choice"
          required: true
          question: "What industry does your organization operate in?"
          options:
            - "Financial Services"
            - "Healthcare"
            - "Technology"
            - "Manufacturing"
            - "Retail"
            - "Government"
          triggers_industry_config: true
          
        - name: "organization_size"
          type: "choice"
          required: true
          question: "What is the size of your organization?"
          options:
            - value: "small"
              label: "Small, under 100 employees"
            - value: "medium"
              label: "Medium, 100 to 1000 employees"
            - value: "large"
              label: "Large, over 1000 employees"
            - value: "enterprise"
              label: "Enterprise, over 10,000 employees"
              
        - name: "region"
          type: "choice"
          required: true
          question: "In which geographic regions does your organization primarily operate?"
          options:
            - "North America"
            - "Europe"
            - "Asia-Pacific"
            - "Global"
          triggers_region_config: true
          
        - name: "business_model"
          type: "text"
          required: false
          question: "What is your organization's business model?"
          
    - name: "Regulatory Environment"
      priority: 2
      required: true
      fields:
        - name: "primary_regulations"
          type: "multi-choice"
          required: true
          question: "What are the primary regulatory requirements your organization must comply with?"
          dynamic_options: true
          
        - name: "compliance_frameworks"
          type: "multi-choice"
          required: true
          question: "Which compliance frameworks does your organization follow?"
          options:
            - "ISO 27001"
            - "SOC 2"
            - "NIST CSF"
            - "PCI DSS"
            - "HIPAA"
            - "GDPR"
            - "Other"
            
        - name: "compliance_certifications"
          type: "text"
          required: false
          question: "What compliance certifications does your organization currently hold?"
          
    - name: "Risk Profile"
      priority: 3
      required: true
      fields:
        # Risk Tolerance by Domain
        - name: "operational_risk_tolerance"
          type: "choice"
          required: true
          question: "What is your operational risk tolerance?"
          options:
            - value: "low"
              label: "Low - Minimal tolerance for operational disruption"
            - value: "medium"
              label: "Medium - Balanced approach to operational risk"
            - value: "high"
              label: "High - Accept higher operational risk for agility"
          document_extraction:
            enabled: true
            keywords: ["operational risk", "risk tolerance", "risk appetite"]
            confidence_threshold: 0.85
            
        - name: "compliance_risk_tolerance"
          type: "choice"
          required: true
          question: "What is your compliance risk tolerance?"
          options:
            - value: "low"
              label: "Low - Zero tolerance for compliance violations"
            - value: "medium"
              label: "Medium - Managed compliance risk"
            - value: "high"
              label: "High - Accept some compliance risk"
          document_extraction:
            enabled: true
            keywords: ["compliance risk", "regulatory risk"]
            confidence_threshold: 0.85
            
        - name: "financial_risk_tolerance"
          type: "choice"
          required: true
          question: "What is your financial risk tolerance?"
          options:
            - value: "low"
              label: "Low - Minimal financial exposure"
            - value: "medium"
              label: "Medium - Balanced financial risk"
            - value: "high"
              label: "High - Accept higher financial risk"
          document_extraction:
            enabled: true
            keywords: ["financial risk", "financial impact"]
            confidence_threshold: 0.85
            
        - name: "reputational_risk_tolerance"
          type: "choice"
          required: true
          question: "What is your reputational risk tolerance?"
          options:
            - value: "low"
              label: "Low - Brand protection is critical"
            - value: "medium"
              label: "Medium - Balanced reputational risk"
            - value: "high"
              label: "High - Accept reputational risk for innovation"
          document_extraction:
            enabled: true
            keywords: ["reputational risk", "brand risk"]
            confidence_threshold: 0.85
            
        # Business Impact
        - name: "financial_impact_threshold"
          type: "number"
          required: true
          question: "What is your financial impact threshold for high-severity incidents (in USD)?"
          unit: "USD"
          document_extraction:
            enabled: true
            keywords: ["financial impact", "cost", "financial threshold"]
            confidence_threshold: 0.80
            
        - name: "business_criticality"
          type: "text"
          required: true
          question: "What are your most business-critical systems or processes?"
          document_extraction:
            enabled: true
            keywords: ["critical systems", "business critical", "mission critical"]
            confidence_threshold: 0.85
            
        # Recovery Objectives
        - name: "rto_critical_systems"
          type: "choice"
          required: true
          question: "What is your RTO (Recovery Time Objective) for critical systems?"
          options:
            - value: "under_1_hour"
              label: "< 1 hour"
            - value: "1_to_4_hours"
              label: "1-4 hours"
            - value: "4_to_24_hours"
              label: "4-24 hours"
            - value: "over_24_hours"
              label: "> 24 hours"
          document_extraction:
            enabled: true
            keywords: ["RTO", "recovery time objective", "recovery time"]
            confidence_threshold: 0.90
            
        - name: "rpo_critical_systems"
          type: "choice"
          required: true
          question: "What is your RPO (Recovery Point Objective) for critical systems?"
          options:
            - value: "under_15_min"
              label: "< 15 minutes"
            - value: "15_to_60_min"
              label: "15-60 minutes"
            - value: "1_to_4_hours"
              label: "1-4 hours"
            - value: "over_4_hours"
              label: "> 4 hours"
          document_extraction:
            enabled: true
            keywords: ["RPO", "recovery point objective", "data loss"]
            confidence_threshold: 0.90
            
        - name: "mttr_target"
          type: "choice"
          required: false
          question: "What is your MTTR (Mean Time To Recover) target?"
          options:
            - "< 1 hour"
            - "1-4 hours"
            - "4-24 hours"
            - "> 24 hours"
          document_extraction:
            enabled: true
            keywords: ["MTTR", "mean time to recover", "recovery target"]
            confidence_threshold: 0.85
            
        # Historical Incidents
        - name: "historical_incidents"
          type: "structured_list"
          required: false
          question: "Describe any security incidents in the past 12-24 months"
          structure:
            - incident_type: ""
              impact: ""
              root_cause: ""
              remediation: ""
              date: ""
          document_extraction:
            enabled: true
            keywords: ["security incident", "breach", "incident history"]
            confidence_threshold: 0.80
            
        # Third-Party Risk
        - name: "third_party_vendors"
          type: "structured_list"
          required: false
          question: "List critical third-party vendors and service providers"
          structure:
            - vendor_name: ""
              vendor_type: ""
              criticality: ""
              data_access: ""
              security_assessment_status: ""
          document_extraction:
            enabled: true
            keywords: ["third party", "vendor", "supplier", "service provider"]
            confidence_threshold: 0.75
            
        # Risk Management Process
        - name: "risk_framework"
          type: "choice"
          required: false
          question: "What risk management framework do you use?"
          options:
            - "ISO 31000"
            - "NIST RMF"
            - "FAIR"
            - "COSO ERM"
            - "Custom"
            - "None"
          dynamic_options: true
          mcp_search_query: "risk management frameworks"
          document_extraction:
            enabled: true
            keywords: ["risk framework", "risk management", "ISO 31000", "NIST RMF"]
            confidence_threshold: 0.85
            
        - name: "data_classification"
          type: "multi-choice"
          required: false
          question: "What data classification levels does your organization use?"
          options:
            - "Public"
            - "Internal"
            - "Confidential"
            - "Restricted"
          document_extraction:
            enabled: true
            keywords: ["data classification", "classification levels"]
            confidence_threshold: 0.80
            
    - name: "Security Capabilities"
      priority: 4
      required: true
      fields:
        # IAM Domain
        - name: "iam_maturity"
          type: "choice"
          required: true
          question: "What is your IAM (Identity and Access Management) maturity level?"
          options:
            - value: "none"
              label: "None - No formal IAM controls"
            - value: "basic"
              label: "Basic - MFA, password policies"
            - value: "intermediate"
              label: "Intermediate - SSO, RBAC"
            - value: "advanced"
              label: "Advanced - Zero Trust, JIT access"
          document_extraction:
            enabled: true
            keywords: ["identity", "access management", "IAM", "authentication", "authorization"]
            confidence_threshold: 0.85
            
        - name: "iam_controls"
          type: "multi_select"
          required: true
          question: "Which IAM controls do you have implemented?"
          options:
            - "Multi-Factor Authentication (MFA)"
            - "Single Sign-On (SSO)"
            - "Role-Based Access Control (RBAC)"
            - "Privileged Access Management (PAM)"
            - "Identity Federation"
            - "Just-In-Time (JIT) Access"
          document_extraction:
            enabled: true
            keywords: ["MFA", "SSO", "RBAC", "PAM", "federation"]
            confidence_threshold: 0.80
            
        # Logging & Monitoring Domain
        - name: "logging_monitoring_maturity"
          type: "choice"
          required: true
          question: "What is your Logging & Monitoring maturity level?"
          options:
            - value: "none"
              label: "None - No centralized logging"
            - value: "basic"
              label: "Basic - Basic log collection"
            - value: "intermediate"
              label: "Intermediate - SIEM, alerting"
            - value: "advanced"
              label: "Advanced - Real-time analytics, automated response"
          document_extraction:
            enabled: true
            keywords: ["logging", "monitoring", "SIEM", "log management"]
            confidence_threshold: 0.85
            
        - name: "logging_monitoring_controls"
          type: "multi_select"
          required: true
          question: "Which Logging & Monitoring controls do you have?"
          options:
            - "Centralized Log Aggregation"
            - "SIEM (Security Information and Event Management)"
            - "Real-time Alerting"
            - "Log Retention Policies"
            - "Security Analytics"
            - "Threat Intelligence Integration"
          document_extraction:
            enabled: true
            keywords: ["log aggregation", "SIEM", "alerting", "analytics"]
            confidence_threshold: 0.80
            
        # Incident Response Domain
        - name: "incident_response_maturity"
          type: "choice"
          required: true
          question: "What is your Incident Response maturity level?"
          options:
            - value: "none"
              label: "None - No formal IR process"
            - value: "basic"
              label: "Basic - IR plan exists"
            - value: "intermediate"
              label: "Intermediate - IR team, runbooks"
            - value: "advanced"
              label: "Advanced - Automated response, regular drills"
          document_extraction:
            enabled: true
            keywords: ["incident response", "IR plan", "security incident"]
            confidence_threshold: 0.85
            
        - name: "incident_response_controls"
          type: "multi_select"
          required: true
          question: "Which Incident Response controls do you have?"
          options:
            - "Incident Response Plan"
            - "Incident Response Team"
            - "Runbooks and Playbooks"
            - "Automated Response"
            - "Regular IR Drills"
            - "Post-Incident Reviews"
          document_extraction:
            enabled: true
            keywords: ["IR plan", "response team", "runbooks", "playbooks"]
            confidence_threshold: 0.80
            
        # Infrastructure Protection Domain
        - name: "infrastructure_protection_maturity"
          type: "choice"
          required: true
          question: "What is your Infrastructure Protection maturity level?"
          options:
            - value: "none"
              label: "None - No formal protection"
            - value: "basic"
              label: "Basic - Firewalls, basic segmentation"
            - value: "intermediate"
              label: "Intermediate - Network segmentation, IDS/IPS"
            - value: "advanced"
              label: "Advanced - Micro-segmentation, DDoS protection"
          document_extraction:
            enabled: true
            keywords: ["infrastructure protection", "network security", "firewall"]
            confidence_threshold: 0.85
            
        - name: "infrastructure_protection_controls"
          type: "multi_select"
          required: true
          question: "Which Infrastructure Protection controls do you have?"
          options:
            - "Network Segmentation"
            - "DDoS Protection"
            - "Intrusion Detection/Prevention (IDS/IPS)"
            - "Vulnerability Management"
            - "Patch Management"
            - "Web Application Firewall (WAF)"
          document_extraction:
            enabled: true
            keywords: ["segmentation", "DDoS", "IDS", "IPS", "vulnerability", "patch"]
            confidence_threshold: 0.80
            
        # Data Protection Domain
        - name: "data_protection_maturity"
          type: "choice"
          required: true
          question: "What is your Data Protection maturity level?"
          options:
            - value: "none"
              label: "None - No formal data protection"
            - value: "basic"
              label: "Basic - Encryption at rest"
            - value: "intermediate"
              label: "Intermediate - Encryption in transit, data classification"
            - value: "advanced"
              label: "Advanced - DLP, tokenization, comprehensive encryption"
          document_extraction:
            enabled: true
            keywords: ["data protection", "encryption", "data security"]
            confidence_threshold: 0.85
            
        - name: "data_protection_controls"
          type: "multi_select"
          required: true
          question: "Which Data Protection controls do you have?"
          options:
            - "Encryption at Rest"
            - "Encryption in Transit"
            - "Data Classification"
            - "Data Loss Prevention (DLP)"
            - "Backup and Recovery"
            - "Key Management"
          document_extraction:
            enabled: true
            keywords: ["encryption", "DLP", "backup", "key management"]
            confidence_threshold: 0.80
            
        # Security Tools Inventory
        - name: "security_tools"
          type: "structured"
          required: false
          question: "What security tools do you use? (organized by domain)"
          structure:
            - domain: "IAM"
              tools: []
            - domain: "Logging & Monitoring"
              tools: []
            - domain: "Incident Response"
              tools: []
            - domain: "Infrastructure Protection"
              tools: []
            - domain: "Data Protection"
              tools: []
          document_extraction:
            enabled: true
            keywords: ["security tools", "security products", "security solutions"]
            confidence_threshold: 0.75
            
    - name: "Technology Environment"
      priority: 5
      required: true
      fields:
        - name: "cloud_platforms"
          type: "multi-choice"
          required: true
          question: "Which cloud platforms does your organization use?"
          options:
            - "AWS"
            - "Microsoft Azure"
            - "Google Cloud"
            - "Multi-cloud"
            - "On-premises only"
            
        - name: "infrastructure_type"
          type: "choice"
          required: true
          question: "What type of infrastructure does your organization have?"
          options:
            - "Cloud-only"
            - "Hybrid"
            - "On-premises"
            - "Colocation"
            
        - name: "data_storage"
          type: "text"
          required: false
          question: "Where does your organization store its data?"
          
    - name: "Business Context"
      priority: 6
      required: false
      fields:
        - name: "key_processes"
          type: "text"
          required: true
          question: "What are your organization's key business processes?"
          
        - name: "stakeholder_requirements"
          type: "text"
          required: false
          question: "What are your key stakeholder security requirements?"

    - name: "Risk Assessment Context"
      priority: 7
      required: true
      fields:
        - name: "revenue"
          type: "text"
          required: true
          question: "What is your organization's annual revenue?"
          document_extraction:
            enabled: true
            keywords: ["revenue", "annual revenue", "turnover", "total income"]
            confidence_threshold: 0.80

        - name: "customers"
          type: "text"
          required: true
          question: "How many customers does your organization serve?"
          document_extraction:
            enabled: true
            keywords: ["customers", "clients", "users", "accounts", "policyholders"]
            confidence_threshold: 0.80

        - name: "crown_jewels"
          type: "text"
          required: true
          question: "What are your top 3-5 most critical assets — the ones whose compromise would be existential to the business?"
          document_extraction:
            enabled: true
            keywords: ["critical asset", "crown jewel", "most important", "highest value", "existential"]
            confidence_threshold: 0.75

        - name: "threat_landscape"
          type: "text"
          required: true
          question: "What threat actors are most relevant to your organization? (e.g., nation-state, financially motivated, insider, hacktivists)"
          document_extraction:
            enabled: true
            keywords: ["threat actor", "threat landscape", "adversary", "attacker", "threat intelligence"]
            confidence_threshold: 0.75

        - name: "change_velocity"
          type: "text"
          required: true
          question: "How frequently does your environment change? (deployments per week, patch cadence)"
          document_extraction:
            enabled: true
            keywords: ["deploy", "deployment", "release", "patch", "change rate", "CI/CD"]
            confidence_threshold: 0.75

        - name: "key_vendors"
          type: "text"
          required: true
          question: "Who are your critical third-party vendors and what services do they provide?"
          document_extraction:
            enabled: true
            keywords: ["vendor", "third party", "supplier", "service provider", "outsource"]
            confidence_threshold: 0.75

        - name: "recent_incidents"
          type: "text"
          required: true
          question: "Have there been any security incidents in the past 24 months? If so, what happened?"
          document_extraction:
            enabled: true
            keywords: ["incident", "breach", "security event", "compromise", "attack"]
            confidence_threshold: 0.80

        - name: "audit_findings"
          type: "text"
          required: true
          question: "Are there any open audit findings or regulatory observations? What are the key ones?"
          document_extraction:
            enabled: true
            keywords: ["audit finding", "observation", "non-compliance", "remediation", "corrective action"]
            confidence_threshold: 0.80

# Conversation Flow Rules
conversation_flow:
  min_completeness_threshold: 0.7
  
  core_fields:
    - "organization_name"
    - "industry"
    - "organization_size"
    - "region"
    
  section_order:
    - "Basic Information"
    - "Regulatory Environment"
    - "Risk Profile"
    - "Security Capabilities"
    - "Technology Environment"
    - "Business Context"
    - "Risk Assessment Context"
    
  skip_optional_if_time_constrained: true

# Auto-Save Configuration
auto_save:
  enabled: true
  save_after_section: true
  save_interval_seconds: 300
  prompt_pause_after_section: true
  pause_message: "Great progress! Your answers have been saved. Would you like to continue to the next section or pause and resume later?"

# Industry Detection Keywords
industry_detection:
  financial:
    keywords: ["bank", "finance", "financial", "credit", "investment", "insurance", "fintech"]
  healthcare_providers:
    keywords: ["health", "medical", "hospital", "clinic", "healthcare", "provider"]
  pharma:
    keywords: ["pharma", "pharmaceutical", "drug", "clinical", "FDA", "GxP"]
  mining:
    keywords: ["mining", "extraction", "minerals", "MSHA", "mine"]
  construction:
    keywords: ["construction", "building", "contractor", "OSHA", "site"]
  retail:
    keywords: ["retail", "store", "commerce", "shopping", "ecommerce"]
  technology:
    keywords: ["tech", "software", "it", "saas", "cloud", "technology"]
  manufacturing:
    keywords: ["manufacturing", "factory", "production", "industrial"]
  government:
    keywords: ["government", "public", "federal", "state", "municipal"]

# Region Detection Keywords
region_detection:
  north_america:
    keywords: ["us", "usa", "united states", "america", "canada", "mexico", "north america"]
  europe:
    keywords: ["eu", "europe", "european", "uk", "germany", "france", "gdpr"]
  apac:
    keywords: ["asia", "pacific", "apac", "japan", "australia", "singapore", "china", "india"]
  global:
    keywords: ["global", "worldwide", "international", "multinational"]
